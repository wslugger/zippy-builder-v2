name: Automated Production Deployment

on:
  push:
    branches:
      - main

jobs:
  deploy:
    name: Deploy on Mac Mini
    runs-on: [self-hosted, macmini] # <--- Moved from failing Linux box to this new Mac Mini
    
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Install Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install Dependencies
        run: npm install
        
      - name: Build Production Payload
        run: npm run build
        
      - name: Restart Application Service
        run: pm2 restart zippy-builder || pm2 start npm --name "zippy-builder" -- start
